spring.application.name=ecommerce-backend

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ecommerce_backend}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345678}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Base64 encoded 32-byte key (required for HS256)
jwt.secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

# Default admin seeded at startup if not present
app.admin.email=${APP_ADMIN_EMAIL:admin@test.com}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}
app.admin.name=${APP_ADMIN_NAME:Default Admin}

# CSV upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
